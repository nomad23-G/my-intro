<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tsukki- | Innovation in Lifestyle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="apple-style">
    <nav class="glass-nav">
        <div class="nav-content">
            <span class="logo">Tsukki-</span>
        </div>
    </nav>

    <main id="content">
        <!-- Hero Section -->
        <section class="stunning-hero">
            <div class="hero-inner">
                <h1 class="main-title">Tsukki-</h1>
                <p class="sub-title">Travel. Baseball. Surfing. Cafe.</p>
            </div>
        </section>

        <!-- Travel Section -->
        <section class="feature-section" id="travel">
            <div class="sticky-container">
                <div class="bg-image travel-bg"></div>
                <div class="content-box">
                    <h2 class="section-title">Travel</h2>
                    <p class="section-copy">さらに遠く。未知なる景色へ。</p>
                </div>
            </div>
        </section>

        <!-- Baseball Section -->
        <section class="feature-section" id="baseball">
            <div class="sticky-container">
                <div class="bg-image baseball-bg"></div>
                <div class="content-box">
                    <h2 class="section-title">Baseball</h2>
                    <p class="section-copy">情熱を、フルスイングで。</p>
                </div>
            </div>
        </section>

        <!-- Surfing Section -->
        <section class="feature-section" id="surfing">
            <div class="sticky-container">
                <div class="bg-image surfing-bg"></div>
                <div class="content-box">
                    <h2 class="section-title">Surfing</h2>
                    <p class="section-copy">波とともに、自由を駆ける。</p>
                </div>
            </div>
        </section>

        <!-- Cafe Section -->
        <section class="feature-section" id="cafe">
            <div class="sticky-container">
                <div class="bg-image cafe-bg"></div>
                <div class="content-box">
                    <h2 class="section-title">Cafe</h2>
                    <p class="section-copy">静寂と、一杯の至福。</p>
                </div>
            </div>
        </section>

        <section class="footer-cta">
            <div class="container">
                <h3>Tsukki- Portfolio</h3>
                <p>Designed for the digital era.</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
